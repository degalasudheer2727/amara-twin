name: Deploy (Vercel)

# Automated deployment. PRs get an ephemeral preview URL; merges to main ship
# to production. Gated behind CI + DevSecOps so nothing insecure reaches prod.
#
# Seamless-by-default: if the Vercel secrets are not configured yet, the deploy
# is skipped cleanly (green, neutral) instead of failing the pipeline. Run
# ./scripts/bootstrap.sh — or set VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID
# in repo secrets — to switch live deploys on.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect whether deployment credentials exist. Secrets can't be read inside a
  # job-level `if:`, so we surface their presence as an output other jobs gate on.
  preflight:
    name: Check deploy credentials
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ] && [ -n "${{ secrets.VERCEL_ORG_ID }}" ] && [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✅ Vercel credentials present — deployment will run."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ Vercel secrets not set — skipping deploy. Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID (or run scripts/bootstrap.sh) to enable."
          fi

  deploy:
    name: Deploy to Vercel
    needs: preflight
    if: needs.preflight.outputs.configured == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to $URL"
      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🚀 **AMARATWIN preview deployed:** ${{ steps.deploy.outputs.url }}`
            })
